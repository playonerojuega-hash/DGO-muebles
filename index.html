<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGO Muebles - Sistema de Pedidos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menuInicio" class="menu-container">
        
        <header class="hero">
            <div class="logo-container">
                <img src="DGO_muebles.png" alt="DGO Muebles">
            </div>
        </header>

        <main class="opciones-grid">
            <div class="tarjeta-opcion" onclick="mostrarVista('pantallaPedido')">
                <h3>📦 Hacer un Pedido</h3>
                <p>Personaliza tu sofá, comedor o cama y envíalo directo al taller de fabricación.</p>
                <button class="btn-menu">Iniciar Solicitud</button>
            </div>

            <div class="tarjeta-opcion" onclick="mostrarVista('pantallaConsulta')">
                <h3>🔍 Ver mi Pedido</h3>
                <p>¿Ya tienes un pedido en marcha? Consulta su estado de avance en tiempo real.</p>
                <button class="btn-menu">Consultar Estado</button>
            </div>
        </main>
    </div>

    <div id="pantallaPedido" class="form-container oculto">
        <button class="btn-volver" onclick="mostrarVista('menuInicio')">← Volver al inicio</button>
        <h2>Nuevo Pedido</h2>
        <form id="formPedido">
            <label for="nombre">Nombre del Cliente</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>

            <label for="telefono">Teléfono de Contacto</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Ej. 315xxxxxxx" required>

            <label for="direccion">Dirección de Entrega</label>
            <input type="text" id="direccion" name="direccion" placeholder="Ej. Calle 30 #24-10" required>

            <label for="mueble">Tipo de Mueble</label>
            <select id="mueble" name="mueble" required>
                <option value="" disabled selected>Selecciona una opción...</option>
                <option value="Sofá">Sofá</option>
                <option value="Comedor">Comedor</option>
                <option value="Cama Matrimonial">Cama Matrimonial</option>
                <option value="Armario / Closet">Armario / Closet</option>
                <option value="Mueble de Cocina">Mueble de Cocina</option>
                <option value="Otro / Especial">Otro / Especial</option>
            </select>

            <label for="especificaciones">Especificaciones (Medidas, Telas, Colores)</label>
            <textarea id="especificaciones" name="especificaciones" rows="4" placeholder="Ej. Tela tipo lona color gris, patas de madera roble, medidas 2x1.50 metros..." required></textarea>

            <button type="submit" id="btnEnviar">Enviar Pedido al Taller</button>
        </form>
        <div id="mensajeExito" class="oculto">¡Pedido enviado con éxito al taller!</div>
    </div>

    <div id="pantallaConsulta" class="form-container oculto">
        <button class="btn-volver" onclick="mostrarVista('menuInicio')">← Volver al inicio</button>
        <h2>Consultar Estado</h2>
        <form id="formConsulta">
            <label for="telefonoConsulta">Introduce tu número de teléfono</label>
            <input type="tel" id="telefonoConsulta" placeholder="El número usado en el pedido" required>
            <button type="submit" id="btnConsultar">Buscar Mi Pedido</button>
        </form>

        <div id="resultadoConsulta" class="resultado-caja oculto">
            <h4 id="resMueble">📦 Cargando mueble...</h4>
            <div style="margin-bottom: 15px;">
                <span id="resEstado" class="badge">Estado</span>
            </div>
            <p id="resDetalle" style="font-size: 14px; color: #555555; margin: 0; line-height: 1.5;"></p>
        </div>
    </div>

    <script>
        function mostrarVista(idVista) {
            document.getElementById('menuInicio').classList.add('oculto');
            document.getElementById('pantallaPedido').classList.add('oculto');
            document.getElementById('pantallaConsulta').classList.add('oculto');
            document.getElementById(idVista).classList.remove('oculto');
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
